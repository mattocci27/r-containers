on:
  schedule:
    - cron: '0 0 * * 1'
  push:
    paths:
      - 'images/**'
      - 'bakefiles/**'
      - '**/update.yml'
  workflow_dispatch:

env:
  LATEST_TAG: 4.5.3
  IMAGES: radian radian-verse radian-zsh cmdstan-verse cmdstan-zsh

jobs:
  build-single-arch:
    name: Build ${{ matrix.arch }} images
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
            bakefile: bakefiles/bakefile_amd.json
          - arch: arm64
            runner: ubuntu-24.04-arm
            bakefile: bakefiles/bakefile_arm.json
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: abatilo/actions-poetry@v4
        with:
          poetry-version: '2.2.1'

      - name: Cache Poetry virtualenv
        uses: actions/cache@v3
        with:
          path: ~/.cache/pypoetry/virtualenvs
          key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Generate build definitions
        run: |
          poetry --version
          poetry install --no-root
          poetry run python scripts/update.py
          poetry run python scripts/generate_bake.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push ${{ matrix.arch }} images
        run: |
          for image in ${IMAGES}; do
            echo "Building ${image} for ${{ matrix.arch }}"
            docker buildx bake -f ${{ matrix.bakefile }} --push ${image}
          done

  publish-manifests:
    name: Publish multi-arch manifests
    runs-on: ubuntu-latest
    needs: build-single-arch
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest lists
        run: |
          set -euo pipefail
          for image in ${IMAGES}; do
            echo "Processing ${image}"
            docker buildx imagetools create \
              --tag ghcr.io/${{ github.repository_owner }}/${image}:${LATEST_TAG} \
              --tag ghcr.io/${{ github.repository_owner }}/${image}:latest \
              --tag mattocci/${image}:${LATEST_TAG} \
              --tag mattocci/${image}:latest \
              mattocci/${image}:${LATEST_TAG}_amd64 \
              mattocci/${image}:${LATEST_TAG}_arm64
          done

